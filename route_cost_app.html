<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>路線成本估算 APP</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- React Core -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- ✨ 新增：SheetJS 解析 Excel 專用套件 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    body { 
      background-color: #0f172a; 
      color: #f8fafc;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior-y: none;
    }
    
    /* 隱藏捲軸但保留捲動功能 */
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* APP 底部安全距離 (適用於 iPhone 等全螢幕裝置) */
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    .pt-safe { padding-top: env(safe-area-inset-top); }

    .glass-card {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    
    .gemini-gradient {
      background: linear-gradient(135deg, #4f46e5 0%, #06b6d4 100%);
    }

    input[type="number"], input[type="text"], input[type="month"] {
      font-size: 16px; /* 防止 iOS Safari 自動放大 */
    }
  </style>
</head>
<body class="font-sans antialiased overflow-hidden selection:bg-emerald-500/30">

  <div id="root" class="h-screen w-full max-w-md mx-auto bg-slate-950 relative shadow-2xl flex flex-col"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // ==========================================
    // 🚀 雲端與 API 設定
    // ==========================================
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxMwgKyp5YcZ5ZDp6Q53V6qpA4sBmwoht3li9hGanbJFizk06ZazA7ohYxTNmQHJYbw/exec"; 
    const GOOGLE_MAPS_KEY = "AIzaSyDVt5ap79LCy2LPi7eWuCcl9MiRm7uKVCM";
    
    // 👇 1. 請將 "" 中間替換成您剛剛申請的 API Key (例如: "AIzaSy...")
    const GEMINI_API_KEY = "AIzaSyCdYs3x2MVK8hbmbFD5BukNIVW23SKEAFk"; 

    const Icon = ({ name, className = "", size = "1rem" }) => <i className={`fa-solid ${name} ${className}`} style={{fontSize: size}}></i>;

    // --- Gemini API Call ---
    async function callGemini(userQuery, systemPrompt = "") {
      // 🌟 2. 智慧判斷：若有填寫 API Key 則使用正式版 1.5-flash 模型，否則維持測試版
      const model = GEMINI_API_KEY ? "gemini-1.5-flash" : "gemini-2.5-flash-preview-09-2025";
      const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${GEMINI_API_KEY}`;
      const payload = { contents: [{ parts: [{ text: userQuery }] }], systemInstruction: { parts: [{ text: systemPrompt }] } };
      for (let i = 0; i < 3; i++) {
        try {
          const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
          if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
          const result = await res.json();
          return result.candidates?.[0]?.content?.parts?.[0]?.text || "無法回覆。";
        } catch (error) { if (i === 2) throw error; await new Promise(r => setTimeout(r, 1000 * Math.pow(2, i))); }
      }
    }

    function App() {
      // --- APP 狀態 ---
      const [activeTab, setActiveTab] = useState('model'); // model, history, ai
      const [toast, setToast] = useState({ show: false, message: '', type: 'success' });
      const [isSyncing, setIsSyncing] = useState(false);

      // --- 建模參數 ---
      const [routeName, setRouteName] = useState('北高主線');
      const [startPoint, setStartPoint] = useState('烏日');
      const [endPoint, setEndPoint] = useState('大溪');
      const [mileage, setMileage] = useState(320);
      const [fuelPrice, setFuelPrice] = useState(29.5);
      const [fuelConsumption, setFuelConsumption] = useState(2.7);
      const [ureaRate, setUreaRate] = useState(2.5);
      const [maintenanceRate, setMaintenanceRate] = useState(2.5);
      const [etagRate, setEtagRate] = useState(1.0);
      const [driverSalary, setDriverSalary] = useState(3000);
      const [loan, setLoan] = useState(0);
      const [insurance, setInsurance] = useState(0);
      const [taxes, setTaxes] = useState(0);

      const [cloudRoutes, setCloudRoutes] = useState([]);
      const [isCalculating, setIsCalculating] = useState(false);
      const [currentRouteId, setCurrentRouteId] = useState(null);
      
      const [savedLocations, setSavedLocations] = useState(() => JSON.parse(localStorage.getItem('m3_locations') || '["烏日", "大溪", "觀音", "岡山"]'));
      const [isLocManagerOpen, setIsLocManagerOpen] = useState(false);
      const [newLocationInput, setNewLocationInput] = useState('');
      const [isImportingLocs, setIsImportingLocs] = useState(false); // ✨ 處理 Excel 匯入狀態

      // --- AI 狀態 ---
      const [aiInput, setAiInput] = useState('');
      const [aiMessages, setAiMessages] = useState([
        { role: 'assistant', content: '您好！我是您的 AI 成本優化顧問。我可以幫您分析當前的路線成本或提供節流建議。' }
      ]);
      const [isAILoading, setIsAILoading] = useState(false);
      const [quickInsight, setQuickInsight] = useState('');
      const [isInsightLoading, setIsInsightLoading] = useState(false);
      const messagesEndRef = useRef(null);

      // AI 快捷指令
      const aiPrompts = [
        "📊 分析當前成本結構",
        "⛽ 如何優化油耗與保修？",
        "💡 給我三個降本增效的建議"
      ];

      // --- 初始化 ---
      useEffect(() => { loadCloudData(); loadGoogleMaps(); }, []);
      useEffect(() => { if (activeTab === 'ai' && messagesEndRef.current) messagesEndRef.current.scrollIntoView({ behavior: 'smooth' }); }, [aiMessages, activeTab]);

      const showToast = (message, type = 'success') => {
        setToast({ show: true, message, type });
        setTimeout(() => setToast({ show: false, message: '', type: 'success' }), 3000);
      };

      const loadGoogleMaps = () => {
        if (!window.google) { const script = document.createElement('script'); script.src = `https://maps.googleapis.com/maps/api/js?key=${GOOGLE_MAPS_KEY}`; script.async = true; document.head.appendChild(script); }
      };

      const loadCloudData = async () => {
        setIsSyncing(true);
        try {
          const res = await fetch(`${GAS_URL}?sheet=routes`);
          const data = await res.json();
          if (Array.isArray(data)) setCloudRoutes(data);
        } catch (e) { showToast("雲端讀取失敗，請檢查網路", "error"); } 
        finally { setIsSyncing(false); }
      };

      // --- 成本核心算法 ---
      const stats = useMemo(() => {
        const dist = parseFloat(mileage) || 0;
        const fuelUsed = dist / fuelConsumption;
        const cFuel = fuelUsed * fuelPrice;
        const cUrea = cFuel * (parseFloat(ureaRate) / 100) || 0;
        const cMaint = dist * maintenanceRate;
        const cEtag = dist * etagRate;
        
        const fSalary = parseFloat(driverSalary) || 0;
        const fLoan = (parseFloat(loan) || 0) / 30;
        const fFixed = (parseFloat(insurance) || 0) / 365 + (parseFloat(taxes) || 0) / 365;

        const dailyTotal = cFuel + cUrea + cMaint + cEtag + fSalary + fLoan + fFixed;

        return {
          dailyTotal,
          costPerKm: dist > 0 ? dailyTotal / dist : 0,
          breakdown: [
            { label: '油資', value: cFuel, color: 'bg-blue-500', icon: 'fa-gas-pump' },
            { label: '薪資', value: fSalary, color: 'bg-emerald-500', icon: 'fa-user' },
            { label: '保修', value: cMaint, color: 'bg-amber-500', icon: 'fa-wrench' },
            { label: '規費/貸款', value: fLoan + fFixed, color: 'bg-rose-500', icon: 'fa-building-columns' },
            { label: 'E-tag', value: cEtag, color: 'bg-slate-400', icon: 'fa-road' },
            { label: '尿素', value: cUrea, color: 'bg-cyan-500', icon: 'fa-droplet' }
          ]
        };
      }, [mileage, fuelPrice, fuelConsumption, ureaRate, maintenanceRate, etagRate, driverSalary, loan, insurance, taxes]);

      // --- 功能操作 ---
      const calculateDistance = async () => {
        if (!startPoint || !endPoint) return showToast("請填寫起點與終點", "error");
        setIsCalculating(true);
        try {
          const service = new window.google.maps.DistanceMatrixService();
          service.getDistanceMatrix({ origins: [startPoint], destinations: [endPoint], travelMode: 'DRIVING' }, (response, status) => {
            if (status === 'OK' && response.rows[0].elements[0].status === 'OK') {
              const dist = Math.ceil(response.rows[0].elements[0].distance.value / 1000); setMileage(dist); showToast(`算距完成：${dist} KM`);
            } else { showToast("地圖算距失敗", "error"); }
            setIsCalculating(false);
          });
        } catch (e) { showToast("Google Maps 未就緒", "error"); setIsCalculating(false); }
      };

      const handleNewRoute = () => {
        setCurrentRouteId(null);
        setRouteName('');
        setStartPoint('');
        setEndPoint('');
        setMileage(0);
      };

      const handleLoadRouteById = (id) => {
        if (!id) return handleNewRoute();
        const route = cloudRoutes.find(r => r.id === id);
        if (route) {
          setCurrentRouteId(route.id);
          setRouteName(route.name || '');
          setStartPoint(route.origin || '');
          setEndPoint(route.dest || '');
          setMileage(route.mileage || 0);
          showToast(`已載入：${route.name}`);
        }
      };

      const handleDeleteCurrent = async () => {
        if (!currentRouteId) return;
        await handleDelete(currentRouteId);
      };

      const addLocation = (loc) => {
        const val = String(loc).trim();
        if (!val) { showToast('請先輸入地點名稱', 'error'); return false; }
        if (savedLocations.includes(val)) { showToast('地點已存在於常用清單', 'error'); return false; }
        const newList = [...savedLocations, val];
        setSavedLocations(newList);
        localStorage.setItem('m3_locations', JSON.stringify(newList));
        showToast(`已新增常用地點：${val}`);
        return true;
      };

      const removeLocation = (loc) => {
        const newList = savedLocations.filter(l => l !== loc);
        setSavedLocations(newList);
        localStorage.setItem('m3_locations', JSON.stringify(newList));
      };

      // ✨ 新增：解析 Excel 歷史路線表並匯入新地點
      const handleImportLocations = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (!window.XLSX) return showToast('Excel 模組尚未載入完成，請稍後重試', 'error');

        setIsImportingLocs(true);
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const wb = window.XLSX.read(new Uint8Array(event.target.result), { type: 'array' });
            // 讀取第一個分頁，並將空白預設為空字串
            const rows = window.XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: '' });

            const newLocsSet = new Set(savedLocations); // 使用 Set 過濾重複地點
            let importedCount = 0;

            rows.forEach(row => {
              // 智慧識別多種常見的表頭命名
              const start = String(row['起點'] || row['Origin'] || row['origin'] || row['出發地'] || '').trim();
              const end = String(row['終點'] || row['Dest'] || row['dest'] || row['Destination'] || row['目的地'] || '').trim();

              if (start && !newLocsSet.has(start)) { newLocsSet.add(start); importedCount++; }
              if (end && !newLocsSet.has(end)) { newLocsSet.add(end); importedCount++; }
            });

            if (importedCount > 0) {
              const updatedList = Array.from(newLocsSet);
              setSavedLocations(updatedList);
              localStorage.setItem('m3_locations', JSON.stringify(updatedList));
              showToast(`成功從表單萃取並匯入 ${importedCount} 個新地點！`);
            } else {
              showToast('未發現新地點，請確認表頭是否包含「起點」與「終點」', 'error');
            }
          } catch (err) {
            showToast('檔案解析失敗，請確認是否為有效 Excel 檔', 'error');
          } finally {
            setIsImportingLocs(false);
            e.target.value = null; // 重置 input
          }
        };
        reader.readAsArrayBuffer(file);
      };

      const handleSave = async () => {
        if (!routeName) return showToast("請輸入路線名稱", "error");
        setIsSyncing(true);
        const routeData = { name: routeName, origin: startPoint, dest: endPoint, mileage: Number(mileage), totalCost: Math.round(stats.dailyTotal), costPerKm: Number(stats.costPerKm.toFixed(2)) };
        try {
          if (currentRouteId) {
            await fetch(GAS_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ action: 'update', sheet: 'routes', id: currentRouteId, data: routeData }) });
            setCloudRoutes(cloudRoutes.map(r => r.id === currentRouteId ? { ...r, ...routeData } : r));
            showToast("已更新路線模型");
          } else {
            const newRoute = { id: `R-${Date.now()}`, ...routeData, createdAt: new Date().toLocaleString() };
            await fetch(GAS_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ action: 'create', sheet: 'routes', data: newRoute }) });
            setCloudRoutes([newRoute, ...cloudRoutes]);
            setCurrentRouteId(newRoute.id);
            showToast("已建立並儲存新路線");
          }
        } catch (e) { showToast("雲端同步失敗", "error"); } 
        finally { setIsSyncing(false); }
      };

      const handleDelete = async (id) => {
        setIsSyncing(true);
        try {
          await fetch(GAS_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ action: 'delete', sheet: 'routes', id: id }) });
          setCloudRoutes(cloudRoutes.filter(r => r.id !== id)); 
          if (currentRouteId === id) handleNewRoute(); // 若刪除的是目前編輯的路線，自動清空表單
          showToast("已刪除模型");
        } catch (e) { showToast("刪除失敗", "error"); } 
        finally { setIsSyncing(false); }
      };

      const handleAISend = async (customQuery = null) => {
        const query = typeof customQuery === 'string' ? customQuery : aiInput;
        if (!query.trim()) return;
        
        if (typeof customQuery !== 'string') setAiInput('');
        setAiMessages(prev => [...prev, { role: 'user', content: query }]);
        setIsAILoading(true);

        const systemPrompt = `你是一位專業的運務財務顧問。當前正在估算的路線為「${routeName}」，里程 ${mileage}KM。
目前成本結構：總成本 $${Math.round(stats.dailyTotal)}，每公里 $${stats.costPerKm.toFixed(2)}。
油耗設定 ${fuelConsumption} km/L。請根據這些數據給予精簡、專業的優化建議或回答問題。以繁體中文回覆。`;

        try {
          const response = await callGemini(query, systemPrompt);
          setAiMessages(prev => [...prev, { role: 'assistant', content: response }]);
        } catch (err) { 
          // 🌟 3. 更明確的錯誤提示
          setAiMessages(prev => [...prev, { role: 'assistant', content: "⚠️ AI 伺服器連線異常。如果您已將 APP 發布至 GitHub，請確認您已在程式碼 51 行處填入專屬的 GEMINI_API_KEY。" }]); 
        } 
        finally { setIsAILoading(false); }
      };

      // ✨ AI 一鍵成本診斷
      const generateQuickInsight = async () => {
        setIsInsightLoading(true);
        const fuelRatio = Math.round((stats.breakdown[0].value / stats.dailyTotal) * 100);
        const prompt = `我當前路線 ${routeName} (${mileage}KM) 單趟成本 $${Math.round(stats.dailyTotal)}。油資佔比 ${fuelRatio}%，油耗 ${fuelConsumption}km/L。請直接用繁體中文給出一段約 40 字的「成本健檢結論與警示」，語氣要專業直接，不需問候語。`;
        try {
          const response = await callGemini(prompt);
          setQuickInsight(response);
        } catch (e) {
          // 🌟 4. 更明確的錯誤提示
          setQuickInsight("⚠️ 無法取得 AI 診斷。發布至 GitHub 需在程式碼填寫 GEMINI_API_KEY。");
        }
        setIsInsightLoading(false);
      };

      // ✨ 將歷史路線轉為報價單
      const handleGenerateQuote = (item) => {
        setActiveTab('ai');
        const prompt = `請幫我寫一封正式的 B2B 運費報價信（草稿）。
路線：${item.origin} 到 ${item.dest} (里程 ${item.mileage} KM)
我方單趟成本預估為 $${item.totalCost}。
請自動加上大約 20% 的合理利潤作為「最終報價」，並用專業、客氣的語氣說明我們的運輸品質，字數大約 150 字以內。`;
        handleAISend(prompt);
      };

      // --- UI Components ---
      const InputGroup = ({ label, type="number", value, onChange, icon, step="any", placeholder, list, onAddRight }) => (
        <div className="flex flex-col gap-1.5 mb-4">
          <label className="text-[11px] font-bold text-slate-400 uppercase tracking-wider pl-1">{label}</label>
          <div className="relative flex gap-2">
            <div className="relative flex-1">
              {icon && <div className="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-500"><Icon name={icon} /></div>}
              <input list={list} type={type} step={step} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} className={`w-full bg-slate-900 border border-slate-700 text-white rounded-xl py-3 outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all ${icon ? 'pl-10' : 'pl-4'} pr-4`} />
            </div>
            {onAddRight && (
              <button onClick={() => onAddRight(value)} className="shrink-0 bg-slate-800 hover:bg-emerald-900/40 text-emerald-400 border border-slate-700 hover:border-emerald-500/50 px-4 rounded-xl transition-all shadow-sm" title="新增至常用地點"><Icon name="fa-plus"/></button>
            )}
          </div>
        </div>
      );

      return (
        <div className="h-full flex flex-col pt-safe bg-slate-950">
          {/* Header */}
          <header className="h-14 flex items-center justify-between px-4 bg-slate-900/80 backdrop-blur-md border-b border-slate-800 shrink-0 z-20">
            <div className="flex items-center gap-2">
              {/* ✨ 昶青圖示與雲端連線波紋特效 */}
              <div className="relative flex items-center justify-center">
                {isSyncing && <div className="absolute inset-0 bg-emerald-400 rounded-lg animate-ping opacity-60"></div>}
                <div className="relative z-10 bg-gradient-to-br from-emerald-400 to-emerald-600 text-slate-950 font-black text-[12px] px-2 py-1 rounded shadow-[0_0_8px_rgba(16,185,129,0.5)] tracking-widest border border-emerald-300">
                  昶青
                </div>
              </div>
              <h1 className="font-bold text-white text-base tracking-wide flex items-center gap-1.5 ml-1">
                <Icon name="fa-truck-fast" className="text-emerald-400" size="1rem"/>
                路線成本估算
              </h1>
            </div>
            
            <div className="flex items-center">
              {isSyncing ? (
                <span className="text-[10px] text-emerald-400 font-bold tracking-wider flex items-center gap-1.5 bg-emerald-900/40 px-2 py-1 rounded-full border border-emerald-500/40 shadow-sm">
                  <Icon name="fa-satellite-dish" className="animate-pulse" /> 同步中
                </span>
              ) : (
                <span className="text-[10px] text-slate-500 font-bold tracking-wider flex items-center gap-1.5">
                  已連線 <div className="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_6px_#10b981]"></div>
                </span>
              )}
            </div>
          </header>

          {/* Main Scrollable Area */}
          <main className="flex-1 overflow-y-auto hide-scrollbar relative">
            
            {/* Tab 1: Model Input */}
            <div className={`absolute inset-0 transition-opacity duration-300 overflow-y-auto hide-scrollbar pb-24 ${activeTab === 'model' ? 'opacity-100 z-10' : 'opacity-0 z-0 pointer-events-none'}`}>
              
              {/* Sticky Cost Summary Card */}
              <div className="sticky top-0 z-20 p-4 bg-slate-950/90 backdrop-blur-xl border-b border-slate-800 shadow-xl">
                <div className="flex justify-between items-end mb-2">
                  <p className="text-[10px] font-bold text-emerald-500 uppercase tracking-widest">預估單趟總成本</p>
                  <p className="text-xs text-slate-500 font-mono text-right">{mileage} KM</p>
                </div>
                <div className="flex justify-between items-baseline">
                  <span className="text-3xl font-black text-white font-mono tracking-tight"><span className="text-xl text-slate-500 mr-1">$</span>{Math.round(stats.dailyTotal).toLocaleString()}</span>
                  <div className="text-right">
                    <span className="text-lg font-bold text-blue-400 font-mono">${stats.costPerKm.toFixed(1)}</span>
                    <span className="text-[10px] text-slate-500 ml-1">/KM</span>
                  </div>
                </div>
                {/* Mini Progress Bar */}
                <div className="h-2 w-full bg-slate-800 rounded-full mt-3 flex overflow-hidden mb-3">
                  {stats.breakdown.map((item, idx) => (
                    <div key={idx} className={`${item.color} h-full`} style={{ width: `${(item.value / stats.dailyTotal) * 100}%` }}></div>
                  ))}
                </div>
                
                {/* ✨ AI 快速診斷區塊 */}
                <div className="bg-indigo-900/20 border border-indigo-500/30 rounded-xl p-3 relative overflow-hidden">
                  <div className="flex justify-between items-start mb-1">
                    <span className="text-[10px] font-bold text-indigo-400 flex items-center gap-1"><Icon name="fa-sparkles"/> AI 成本健檢</span>
                    <button onClick={generateQuickInsight} disabled={isInsightLoading} className="text-[10px] bg-indigo-600 hover:bg-indigo-500 text-white px-2 py-1 rounded shadow-md active:scale-95 transition-all disabled:opacity-50">
                      {isInsightLoading ? <Icon name="fa-rotate" className="animate-spin" /> : '重新診斷'}
                    </button>
                  </div>
                  <p className="text-xs text-slate-300 leading-relaxed min-h-[36px]">
                    {isInsightLoading ? 'Gemini 引擎分析中...' : (quickInsight || '點擊上方按鈕，取得針對當前參數的即時 AI 優化建議。')}
                  </p>
                </div>
              </div>

              <div className="p-4 space-y-6">
                {/* Section: Route */}
                <section className="glass-card p-5 rounded-2xl">
                  <div className="flex justify-between items-center mb-4">
                    <h2 className="text-sm font-bold text-emerald-400 flex items-center gap-2"><Icon name="fa-route"/> 路線選定</h2>
                    <div className="flex gap-2">
                      <button onClick={() => setIsLocManagerOpen(true)} className="text-[10px] bg-slate-800 text-emerald-400 hover:text-emerald-300 border border-slate-700 hover:border-emerald-500/50 px-3 py-1.5 rounded-lg flex items-center gap-1 transition-colors"><Icon name="fa-map-pin"/> 常用地點庫</button>
                      <button onClick={handleNewRoute} className="text-[10px] bg-slate-800 text-slate-300 hover:text-white px-3 py-1.5 rounded-lg flex items-center gap-1 transition-colors"><Icon name="fa-plus"/> 新增</button>
                      {currentRouteId && <button onClick={handleDeleteCurrent} className="text-[10px] bg-rose-500/20 text-rose-400 hover:bg-rose-500/30 px-3 py-1.5 rounded-lg flex items-center gap-1 transition-colors"><Icon name="fa-trash"/> 刪除</button>}
                    </div>
                  </div>
                  
                  <datalist id="saved-locations-list">
                    {savedLocations.map((loc, idx) => <option key={idx} value={loc} />)}
                  </datalist>

                  <div className="mb-4">
                    <label className="text-[11px] font-bold text-slate-400 uppercase tracking-wider pl-1 mb-1.5 block">快速載入歷史路線</label>
                    <div className="relative">
                      <div className="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-500"><Icon name="fa-folder-open" /></div>
                      <select 
                        value={currentRouteId || ''} 
                        onChange={(e) => handleLoadRouteById(e.target.value)}
                        className="w-full bg-slate-900 border border-slate-700 text-white rounded-xl py-3 pl-10 pr-4 outline-none focus:border-emerald-500 appearance-none"
                      >
                        <option value="">-- 建立自訂新路線 --</option>
                        {cloudRoutes.map(r => (
                          <option key={r.id} value={r.id}>{r.name} ({r.origin} - {r.dest})</option>
                        ))}
                      </select>
                      <div className="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-slate-500"><Icon name="fa-chevron-down" size="0.8rem" /></div>
                    </div>
                  </div>

                  <InputGroup label="路線名稱" type="text" icon="fa-tag" value={routeName} onChange={setRouteName} placeholder="例: 北高特急" />
                  <div className="flex flex-col gap-2">
                    <InputGroup label="起點" type="text" value={startPoint} onChange={setStartPoint} list="saved-locations-list" onAddRight={addLocation} placeholder="輸入或下拉選擇起點..." />
                    <div className="flex items-center justify-center w-full text-slate-600 -my-4 z-10 relative pointer-events-none"><div className="bg-slate-900 p-1 rounded-full"><Icon name="fa-arrow-down" size="0.8rem"/></div></div>
                    <InputGroup label="終點" type="text" value={endPoint} onChange={setEndPoint} list="saved-locations-list" onAddRight={addLocation} placeholder="輸入或下拉選擇終點..." />
                  </div>
                  <div className="flex gap-3 items-end mt-2">
                    <div className="flex-1"><InputGroup label="單趟里程 (KM)" value={mileage} onChange={setMileage} icon="fa-ruler" /></div>
                    <button onClick={calculateDistance} disabled={isCalculating} className="mb-4 h-[46px] px-4 bg-slate-800 text-emerald-400 rounded-xl font-bold border border-slate-700 active:bg-slate-700 transition-colors shrink-0">
                      {isCalculating ? <Icon name="fa-rotate" className="animate-spin"/> : "算距"}
                    </button>
                  </div>
                </section>

                {/* Section: Variables */}
                <section className="glass-card p-5 rounded-2xl">
                  <h2 className="text-sm font-bold text-blue-400 mb-4 flex items-center gap-2"><Icon name="fa-gas-pump"/> 動態成本 (油資/耗損)</h2>
                  <div className="grid grid-cols-2 gap-x-4">
                    <InputGroup label="柴油 (NT$/L)" value={fuelPrice} onChange={setFuelPrice} step="0.1" />
                    <InputGroup label="油耗 (km/L)" value={fuelConsumption} onChange={setFuelConsumption} step="0.1" />
                    <InputGroup label="尿素比例 (%)" value={ureaRate} onChange={setUreaRate} step="0.1" />
                    <InputGroup label="保修 (NT$/KM)" value={maintenanceRate} onChange={setMaintenanceRate} step="0.1" />
                    <div className="col-span-2"><InputGroup label="E-tag (NT$/KM)" value={etagRate} onChange={setEtagRate} step="0.1" /></div>
                  </div>
                </section>

                {/* Section: Fixed */}
                <section className="glass-card p-5 rounded-2xl">
                  <h2 className="text-sm font-bold text-rose-400 mb-4 flex items-center gap-2"><Icon name="fa-building-columns"/> 固定分攤成本</h2>
                  <InputGroup label="司機日薪 (NT$)" value={driverSalary} onChange={setDriverSalary} icon="fa-wallet" />
                  <div className="grid grid-cols-3 gap-x-3">
                    <InputGroup label="月貸款" value={loan} onChange={setLoan} />
                    <InputGroup label="年保費" value={insurance} onChange={setInsurance} />
                    <InputGroup label="年稅金" value={taxes} onChange={setTaxes} />
                  </div>
                </section>

                <button onClick={handleSave} className="w-full bg-emerald-600 hover:bg-emerald-500 active:scale-95 text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-2 transition-all shadow-lg shadow-emerald-900/50">
                  <Icon name="fa-cloud-arrow-up" /> {currentRouteId ? '更新路線模型' : '儲存路線模型'}
                </button>
              </div>
            </div>

            {/* Tab 2: History */}
            <div className={`absolute inset-0 transition-opacity duration-300 overflow-y-auto hide-scrollbar pb-24 p-4 ${activeTab === 'history' ? 'opacity-100 z-10' : 'opacity-0 z-0 pointer-events-none'}`}>
              <h2 className="text-lg font-bold text-white mb-4 flex items-center gap-2"><Icon name="fa-database" className="text-emerald-400"/> 雲端已存模型</h2>
              <div className="space-y-4">
                {cloudRoutes.map(item => (
                  <div key={item.id} className="glass-card p-4 rounded-2xl relative">
                    <div className="absolute top-4 right-4 flex gap-2">
                      <button onClick={() => { handleLoadRouteById(item.id); setActiveTab('model'); }} className="p-2 text-slate-500 active:text-blue-400 bg-slate-900 rounded-full shadow"><Icon name="fa-pen"/></button>
                      <button onClick={() => handleDelete(item.id)} className="p-2 text-slate-500 active:text-rose-400 bg-slate-900 rounded-full shadow"><Icon name="fa-trash-can"/></button>
                    </div>
                    <h3 className="font-bold text-white text-lg mb-2 mr-16">{item.name}</h3>
                    <p className="text-xs text-slate-400 mb-3 bg-slate-900/50 inline-block px-2 py-1 rounded border border-slate-800">{item.origin} <Icon name="fa-arrow-right" size="0.6rem" className="mx-1"/> {item.dest}</p>
                    <div className="flex gap-4 border-t border-slate-700/50 pt-3 mt-1 mb-3">
                      <div><p className="text-[10px] text-slate-500 mb-0.5">總成本</p><p className="font-mono font-bold text-emerald-400">${item.totalCost?.toLocaleString()}</p></div>
                      <div><p className="text-[10px] text-slate-500 mb-0.5">均攤/KM</p><p className="font-mono font-bold text-blue-400">${item.costPerKm}</p></div>
                      <div><p className="text-[10px] text-slate-500 mb-0.5">里程</p><p className="font-mono font-bold text-slate-300">{item.mileage}KM</p></div>
                    </div>
                    {/* ✨ AI 生成報價單按鈕 */}
                    <button onClick={() => handleGenerateQuote(item)} className="w-full bg-indigo-600/20 hover:bg-indigo-600/40 text-indigo-300 border border-indigo-500/30 font-bold text-xs py-2 rounded-xl flex items-center justify-center gap-2 transition-all">
                      <Icon name="fa-sparkles" /> 讓 AI 草擬客戶報價信
                    </button>
                  </div>
                ))}
                {cloudRoutes.length === 0 && (
                  <div className="text-center py-20 text-slate-500"><Icon name="fa-inbox" size="3rem" className="mb-4 block mx-auto opacity-50"/><p>尚無儲存的模型</p></div>
                )}
              </div>
            </div>

            {/* Tab 3: AI Advisor */}
            <div className={`absolute inset-0 transition-opacity duration-300 flex flex-col pb-[72px] ${activeTab === 'ai' ? 'opacity-100 z-10' : 'opacity-0 z-0 pointer-events-none'}`}>
               <div className="gemini-gradient p-4 shrink-0 shadow-lg relative z-20">
                 <h2 className="text-white font-bold flex items-center gap-2 text-sm"><Icon name="fa-sparkles"/> AI 成本優化顧問</h2>
                 <p className="text-white/80 text-xs mt-1">自動帶入當前估算之【{routeName}】數據進行分析</p>
               </div>
               <div className="flex-1 overflow-y-auto p-4 space-y-4 hide-scrollbar">
                  {aiMessages.map((msg, idx) => (
                    <div key={idx} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                      <div className={`max-w-[85%] rounded-2xl p-3 text-sm shadow-md leading-relaxed ${msg.role === 'user' ? 'bg-indigo-600 text-white rounded-br-sm' : 'glass-card text-slate-200 rounded-bl-sm'}`}>
                        {msg.content}
                      </div>
                    </div>
                  ))}
                  {isAILoading && (
                    <div className="flex justify-start"><div className="max-w-[80%] glass-card rounded-2xl p-3 rounded-bl-sm flex gap-2 items-center text-sm text-slate-400"><Icon name="fa-spinner" className="animate-spin text-indigo-400"/> 分析計算中...</div></div>
                  )}
                  <div ref={messagesEndRef} className="h-2"></div>
               </div>
               
               {/* ✨ 快捷 Prompt 區域 */}
               <div className="px-3 pb-2 w-full overflow-x-auto hide-scrollbar shrink-0 absolute bottom-[130px]">
                 <div className="flex gap-2 w-max">
                   {aiPrompts.map((prompt, idx) => (
                     <button key={idx} onClick={() => handleAISend(prompt)} disabled={isAILoading} className="bg-slate-800/80 backdrop-blur border border-slate-700 text-indigo-300 text-xs px-3 py-1.5 rounded-full shadow-sm active:scale-95 transition-all">
                       {prompt}
                     </button>
                   ))}
                 </div>
               </div>

               <div className="p-3 bg-slate-900 border-t border-slate-800 shrink-0 absolute bottom-[72px] w-full">
                 <div className="flex gap-2">
                   <input type="text" value={aiInput} onChange={e=>setAiInput(e.target.value)} onKeyPress={e => e.key === 'Enter' && handleAISend()} placeholder="詢問節流建議或分析..." className="flex-1 bg-slate-950 border border-slate-700 rounded-full px-4 py-2.5 text-sm text-white outline-none focus:border-indigo-500" />
                   <button onClick={handleAISend} disabled={!aiInput.trim() || isAILoading} className="w-11 h-11 rounded-full bg-indigo-600 active:bg-indigo-700 flex items-center justify-center text-white disabled:opacity-50"><Icon name="fa-paper-plane"/></button>
                 </div>
               </div>
            </div>

          </main>

          {/* Bottom Navigation */}
          <nav className="h-[72px] pb-safe bg-slate-900/95 backdrop-blur-xl border-t border-slate-800 flex justify-around items-center px-2 shrink-0 z-50">
            <button onClick={()=>setActiveTab('model')} className={`flex flex-col items-center justify-center w-full h-full gap-1 transition-colors ${activeTab === 'model' ? 'text-emerald-400' : 'text-slate-500'}`}>
              <Icon name="fa-calculator" size="1.2rem" />
              <span className="text-[10px] font-bold">估算建模</span>
            </button>
            <button onClick={()=>setActiveTab('history')} className={`flex flex-col items-center justify-center w-full h-full gap-1 transition-colors ${activeTab === 'history' ? 'text-blue-400' : 'text-slate-500'}`}>
              <Icon name="fa-database" size="1.2rem" />
              <span className="text-[10px] font-bold">雲端紀錄</span>
            </button>
            <button onClick={()=>setActiveTab('ai')} className={`flex flex-col items-center justify-center w-full h-full gap-1 transition-colors ${activeTab === 'ai' ? 'text-indigo-400' : 'text-slate-500'}`}>
              <Icon name="fa-sparkles" size="1.2rem" />
              <span className="text-[10px] font-bold">AI 顧問</span>
            </button>
          </nav>

          {/* Location Manager Modal */}
          {isLocManagerOpen && (
            <div className="fixed inset-0 z-[200] flex items-center justify-center bg-black/80 backdrop-blur-sm p-4 animate-in fade-in duration-200">
              <div className="bg-slate-900 border border-slate-700 rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden flex flex-col max-h-[70vh]">
                <div className="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-950">
                  <h3 className="text-white font-bold flex items-center gap-2 text-sm"><Icon name="fa-map-pin" className="text-emerald-400"/> 管理常用地點庫</h3>
                  <button onClick={() => setIsLocManagerOpen(false)} className="text-slate-400 hover:text-white p-1"><Icon name="fa-xmark"/></button>
                </div>
                
                {/* 手動輸入新增區塊 */}
                <div className="p-4 border-b border-slate-800 bg-slate-900 flex gap-2 shrink-0">
                  <input 
                    type="text" 
                    value={newLocationInput} 
                    onChange={(e) => setNewLocationInput(e.target.value)} 
                    onKeyPress={(e) => { if (e.key === 'Enter') { if (addLocation(newLocationInput)) setNewLocationInput(''); } }}
                    placeholder="手動輸入新地點..." 
                    className="flex-1 bg-slate-950 border border-slate-700 rounded-xl px-3 py-2 text-white text-sm outline-none focus:border-emerald-500 transition-all" 
                  />
                  <button 
                    onClick={() => { if (addLocation(newLocationInput)) setNewLocationInput(''); }} 
                    className="bg-emerald-600 hover:bg-emerald-500 text-white px-4 rounded-xl text-sm font-bold transition-colors shadow-lg shadow-emerald-900/20 whitespace-nowrap"
                  >
                    新增
                  </button>
                </div>

                {/* ✨ 新增：Excel 大量匯入工具列 */}
                <div className="px-4 py-3 border-b border-slate-800 bg-slate-950/50 flex justify-between items-center shrink-0">
                  <span className="text-[11px] text-slate-400 flex items-center gap-1.5"><Icon name="fa-circle-info"/> 從歷史報表萃取地點</span>
                  <label className="cursor-pointer bg-indigo-600 hover:bg-indigo-500 text-white text-[11px] px-3 py-1.5 rounded-lg font-bold flex items-center gap-1.5 transition-colors shadow-md">
                    {isImportingLocs ? <Icon name="fa-rotate fa-spin" /> : <Icon name="fa-file-excel" />}
                    匯入 XLS
                    <input type="file" accept=".xls,.xlsx,.csv" className="hidden" onChange={handleImportLocations} disabled={isImportingLocs} />
                  </label>
                </div>

                <div className="p-4 overflow-y-auto custom-scrollbar flex-1 space-y-2 bg-slate-900">
                  {savedLocations.length === 0 ? (
                    <p className="text-slate-500 text-center py-6 text-sm">尚無常用地點</p>
                  ) : (
                    savedLocations.map((loc, idx) => (
                      <div key={idx} className="flex justify-between items-center bg-slate-950 p-3 rounded-xl border border-slate-800">
                        <span className="text-slate-300 text-sm font-medium">{loc}</span>
                        <button onClick={() => removeLocation(loc)} className="text-slate-500 hover:text-rose-400 p-2 bg-slate-900 rounded-lg transition-colors" title="移除"><Icon name="fa-trash-can"/></button>
                      </div>
                    ))
                  )}
                </div>
              </div>
            </div>
          )}

          {/* Toast */}
          {toast.show && (
            <div className={`fixed top-16 left-1/2 -translate-x-1/2 z-[100] px-5 py-3 rounded-full shadow-2xl border text-sm font-bold flex items-center gap-2 whitespace-nowrap animate-in slide-in-from-top-5 duration-300
              ${toast.type === 'error' ? 'bg-rose-900/90 border-rose-500 text-white' : 'bg-slate-800/90 border-emerald-500 text-emerald-400'}`}>
              <Icon name={toast.type === 'error' ? 'fa-circle-exclamation' : 'fa-circle-check'} /> {toast.message}
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
